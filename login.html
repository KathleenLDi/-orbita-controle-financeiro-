<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar · Órbita</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237C8CFF'/%3E%3Cstop offset='1' stop-color='%233ADFA5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cg transform='rotate(-28 22 22)'%3E%3Cellipse cx='22' cy='22' rx='17' ry='10' fill='none' stroke='%23566095' stroke-width='2'/%3E%3Ccircle cx='39' cy='22' r='3.4' fill='%233ADFA5'/%3E%3Ccircle cx='5' cy='22' r='3.4' fill='%237C8CFF'/%3E%3C/g%3E%3Ccircle cx='22' cy='22' r='6.5' fill='url(%23g)'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0C111C; --surface:#131A2A; --surface2:#1A2338; --border:#242F4B;
    --text:#E9EDF6; --muted:#8A94B0;
    --accent:#7C8CFF; --income:#3ADFA5; --expense:#FF6B7A;
    --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100dvh;display:grid;place-items:center;padding:24px;
    background:var(--bg);color:var(--text);font-family:var(--body);font-size:14.5px;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background:
      radial-gradient(700px 320px at 85% -10%, rgba(124,140,255,.09), transparent 60%),
      radial-gradient(600px 300px at 0% 110%, rgba(58,223,165,.05), transparent 60%);
  }
  .card{
    position:relative;width:min(400px,100%);
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:32px 28px 26px;
  }
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .logo h1{font-family:var(--display);font-size:20px;font-weight:600}
  .logo small{display:block;font-size:11.5px;color:var(--muted);font-weight:400;letter-spacing:.4px}
  .orbit-anim{animation:flutuar 6s ease-in-out infinite}
  @keyframes flutuar{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

  .abas{
    display:grid;grid-template-columns:1fr 1fr;gap:5px;
    background:var(--bg);border:1px solid var(--border);border-radius:11px;
    padding:4px;margin-bottom:20px;
  }
  .abas button{
    border:0;background:transparent;color:var(--muted);cursor:pointer;
    font:600 13px var(--body);padding:8px 0;border-radius:8px;
  }
  .abas button.ativa{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

  form{display:grid;gap:13px}
  [hidden]{display:none!important}
  label{display:grid;gap:5px;font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.3px}
  input{
    width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface2);color:var(--text);font:400 14px var(--body);
  }
  button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .principal{
    margin-top:4px;border:none;border-radius:10px;padding:12px;cursor:pointer;
    background:var(--accent);color:#0C111C;font:600 14px var(--body);
    transition:background .15s,transform .1s;
  }
  .principal:hover{background:#8D9BFF}
  .principal:active{transform:scale(.98)}
  .principal:disabled{opacity:.55;cursor:wait}

  .esqueci{
    background:none;border:none;color:var(--muted);font-size:12.5px;cursor:pointer;
    justify-self:start;padding:0;text-decoration:underline;
  }
  .esqueci:hover{color:var(--text)}

  .aviso{display:none;font-size:13px;border-radius:10px;padding:10px 12px;border:1px solid transparent}
  .aviso.erro{display:block;color:#FFB9C1;border-color:var(--expense);background:rgba(255,107,122,.12)}
  .aviso.ok{display:block;color:#B9F2DC;border-color:var(--income);background:rgba(58,223,165,.12)}

  .rodape{margin-top:20px;text-align:center;font-size:11.5px;color:var(--muted)}
</style>
</head>
<body>

<main class="card">
  <div class="logo">
    <svg class="orbit-anim" viewBox="0 0 44 44" width="40" height="40" role="img" aria-label="Logo Órbita">
      <defs>
        <linearGradient id="lgCore" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#7C8CFF"/><stop offset="1" stop-color="#3ADFA5"/>
        </linearGradient>
      </defs>
      <g transform="rotate(-28 22 22)">
        <ellipse cx="22" cy="22" rx="17" ry="10" fill="none" stroke="#566095" stroke-width="2"/>
        <circle cx="39" cy="22" r="3.4" fill="#3ADFA5"/>
        <circle cx="5" cy="22" r="3.4" fill="#7C8CFF"/>
      </g>
      <circle cx="22" cy="22" r="6.5" fill="url(#lgCore)"/>
    </svg>
    <div>
      <h1>Órbita</h1>
      <small>seu controle financeiro, agora na nuvem</small>
    </div>
  </div>

  <div class="abas" role="tablist">
    <button type="button" id="abaEntrar" class="ativa" role="tab" aria-selected="true">Entrar</button>
    <button type="button" id="abaCriar" role="tab" aria-selected="false">Criar conta</button>
  </div>

  <p id="aviso" class="aviso" role="alert"></p>

  <form id="formEntrar">
    <label>E-mail
      <input type="email" id="loginEmail" autocomplete="email" required>
    </label>
    <label>Senha
      <input type="password" id="loginSenha" autocomplete="current-password" required>
    </label>
    <button type="button" class="esqueci" id="btnEsqueci">Esqueci minha senha</button>
    <button type="submit" class="principal" id="btnEntrar">Entrar</button>
  </form>

  <form id="formCriar" hidden>
    <label>Seu nome
      <input type="text" id="cadNome" autocomplete="name" required minlength="2" placeholder="Como quer ser chamado(a)">
    </label>
    <label>E-mail
      <input type="email" id="cadEmail" autocomplete="email" required>
    </label>
    <label>Senha (mínimo 6 caracteres)
      <input type="password" id="cadSenha" autocomplete="new-password" required minlength="6">
    </label>
    <button type="submit" class="principal" id="btnCriar">Criar minha conta</button>
  </form>

  <p class="rodape">Seus dados são individuais e protegidos. Você escolhe com quem compartilhar.</p>
</main>

<script type="module">
  import { entrar, cadastrar, recuperarSenha, redirecionarSeLogado, mensagemErro } from "./js/auth.js";

  redirecionarSeLogado();

  const $=(id)=>document.getElementById(id);
  const aviso=$("aviso");
  const mostrar=(msg,tipo="erro")=>{aviso.textContent=msg;aviso.className="aviso "+tipo;};
  const limpar=()=>{aviso.className="aviso";};

  $("abaEntrar").onclick=()=>trocar(true);
  $("abaCriar").onclick=()=>trocar(false);
  function trocar(login){
    limpar();
    $("formEntrar").hidden=!login;
    $("formCriar").hidden=login;
    $("abaEntrar").classList.toggle("ativa",login);
    $("abaCriar").classList.toggle("ativa",!login);
    $("abaEntrar").setAttribute("aria-selected",login);
    $("abaCriar").setAttribute("aria-selected",!login);
  }

  $("formEntrar").addEventListener("submit",async(e)=>{
    e.preventDefault(); limpar();
    const btn=$("btnEntrar"); btn.disabled=true;
    try{
      await entrar($("loginEmail").value.trim(),$("loginSenha").value);
      window.location.href="index.html";
    }catch(err){ mostrar(mensagemErro(err)); }
    finally{ btn.disabled=false; }
  });

  $("formCriar").addEventListener("submit",async(e)=>{
    e.preventDefault(); limpar();
    const btn=$("btnCriar"); btn.disabled=true;
    try{
      await cadastrar($("cadNome").value.trim(),$("cadEmail").value.trim(),$("cadSenha").value);
      window.location.href="index.html";
    }catch(err){ mostrar(mensagemErro(err)); }
    finally{ btn.disabled=false; }
  });

  $("btnEsqueci").addEventListener("click",async()=>{
    limpar();
    const email=$("loginEmail").value.trim();
    if(!email) return mostrar("Digite seu e-mail acima e clique de novo em \u201cEsqueci minha senha\u201d.");
    try{
      await recuperarSenha(email);
      mostrar("Enviamos um link de redefinição para "+email+".","ok");
    }catch(err){ mostrar(mensagemErro(err)); }
  });
</script>
</body>
</html>
